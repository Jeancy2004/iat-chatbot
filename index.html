<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IAT Networks Chatbot</title>

<style>

/* 🌈 Animated Background */
body{
margin:0;
font-family:Arial,sans-serif;
height:100vh;
overflow:hidden;
background:linear-gradient(-45deg,#0066ff,#7b2cff,#00c6ff,#f0f4ff);
background-size:400% 400%;
animation:bg 10s ease infinite;
position:relative;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* 🏢 BRAND */
.brand{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
color:white;
opacity:0.12;
pointer-events:none;
}

.brand h1{
font-size:60px;
margin:0;
}

.brand p{
font-size:14px;
margin-top:10px;
}

/* 💬 FLOAT BUTTON */
.chat-toggle{
position:fixed;
bottom:20px;
right:20px;
width:70px;
height:70px;
border-radius:50%;
background:linear-gradient(135deg,#0066ff,#7b2cff);
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
z-index:999;
box-shadow:0 10px 30px rgba(0,0,0,0.35);
animation:float 3s ease-in-out infinite;
transition:0.3s;
}

.chat-toggle:hover{
transform:scale(1.08);
}

@keyframes float{
0%{transform:translateY(0);}
50%{transform:translateY(-5px);}
100%{transform:translateY(0);}
}

/* 💬 INNER ICON */
.chat-icon{
width:56px;
height:56px;
border-radius:50%;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(10px);
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
color:white;
}

/* 🤖 CHAT BOX */
.chatbot{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(0.8);
width:370px;
height:600px;
opacity:0;
pointer-events:none;
display:flex;
flex-direction:column;
border-radius:20px;
overflow:hidden;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(20px);
box-shadow:0 25px 60px rgba(0,0,0,0.3);
z-index:1000;
transition:0.3s ease;
}

/* ✅ SHOW */
.chatbot.show{
opacity:1;
pointer-events:auto;
transform:translate(-50%,-50%) scale(1);
}

/* HEADER */
.chat-header{
padding:12px;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(255,255,255,0.2);
color:white;
}

/* CHAT AREA */
.chat-area{
flex:1;
padding:12px;
overflow-y:auto;
scroll-behavior:smooth;
}

/* MESSAGE */
.message{
margin:8px 0;
padding:10px 12px;
border-radius:14px;
max-width:80%;
font-size:14px;
line-height:1.5;
animation:fade 0.2s ease;
word-wrap:break-word;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(6px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.user{
background:#0066ff;
color:white;
margin-left:auto;
}

.bot{
background:rgba(255,255,255,0.92);
color:#222;
}

/* QUICK */
.quick{
display:flex;
flex-wrap:wrap;
gap:6px;
padding:8px;
}

.quick button{
padding:6px 10px;
border:none;
border-radius:20px;
background:rgba(255,255,255,0.85);
font-size:12px;
cursor:pointer;
transition:0.2s;
}

.quick button:hover{
transform:scale(1.05);
}

/* INPUT */
.input-area{
display:flex;
padding:10px;
background:rgba(255,255,255,0.2);
}

.input-area input{
flex:1;
padding:10px;
border:none;
border-radius:10px;
outline:none;
font-size:14px;
}

.input-area button{
margin-left:6px;
padding:10px 12px;
border:none;
border-radius:10px;
background:#0066ff;
color:white;
cursor:pointer;
}

/* 🎤 VOICE BAR */
.voice-bar{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(10px);
}

.voice-bar button{
background:rgba(255,255,255,0.3);
border:none;
padding:6px 12px;
border-radius:8px;
color:white;
cursor:pointer;
}

/* 📱 MOBILE */
@media(max-width:768px){

.chatbot{
width:95%;
height:92vh;
}

.brand h1{
font-size:36px;
}

.brand p{
font-size:12px;
}

.chat-toggle{
width:64px;
height:64px;
}

.chat-icon{
width:50px;
height:50px;
font-size:24px;
}

}

</style>
</head>

<body>

<!-- 🏢 BRAND -->
<div class="brand">
<h1>IAT Networks</h1>
<p>Smart IT • BPO • Recruitment Solutions</p>
</div>

<!-- 💬 FLOAT BUTTON -->
<div class="chat-toggle" onclick="toggleChat()">

<div class="chat-icon">
💬
</div>

</div>

<!-- 🤖 CHATBOT -->
<div class="chatbot" id="chatbot">

<!-- HEADER -->
<div class="chat-header">

<div style="display:flex;align-items:center;gap:10px;">

<div style="
width:40px;
height:40px;
border-radius:50%;
background:rgba(255,255,255,0.2);
display:flex;
align-items:center;
justify-content:center;
font-size:20px;">
🤖
</div>

<div>
<b>IAT Networks · Assistant</b><br>
<small>Demo • FAQ from public content — not an official channel</small>
</div>

</div>

<button onclick="clearChat()"
style="
background:rgba(255,255,255,0.3);
border:none;
padding:6px 10px;
border-radius:8px;
color:white;
cursor:pointer;">
Clear
</button>

</div>

<!-- QUICK -->
<div class="quick">
<button onclick="quick('services')">Services</button>
<button onclick="quick('internship')">Internship</button>
<button onclick="quick('contact')">Contact</button>
<button onclick="quick('location')">Location</button>
</div>

<!-- CHAT AREA -->
<div class="chat-area" id="chatArea">

<div class="message bot">
👋 Hi! How can I help you?
</div>

</div>

<!-- INPUT -->
<div class="input-area">

<input
type="text"
id="userInput"
placeholder="Ask me anything..."
>

<button onclick="sendMessage()">
Send
</button>

</div>

<!-- 🎤 VOICE -->
<div class="voice-bar">

<div style="font-size:12px;color:white;">
🎤 Voice Assistant
</div>

<button id="voiceBtn" onclick="toggleVoice()">
🔊 OFF
</button>

</div>

</div>

<script>

let voiceEnabled=false;

/* ✅ TOGGLE CHAT */
function toggleChat(){

let chatbot=document.getElementById("chatbot");

chatbot.classList.toggle("show");

}

/* QUICK */
function quick(t){

document.getElementById("userInput").value=t;

sendMessage();

}

/* CLEAR */
function clearChat(){

document.getElementById("chatArea").innerHTML=
`<div class="message bot">👋 Chat cleared!</div>`;

}

/* VOICE */
function toggleVoice(){

voiceEnabled=!voiceEnabled;

document.getElementById("voiceBtn").innerText=
voiceEnabled ? "🔊 ON" : "🔊 OFF";

}

/* SPEAK */
function speak(text){

if(!voiceEnabled) return;

let msg=new SpeechSynthesisUtterance(text);

window.speechSynthesis.speak(msg);

}

/* BOT */
function getReply(t){

t=t.toLowerCase();

/* HI */
if(t.includes("hi") || t.includes("hello"))
return `Hello! I’m a sample assistant for IAT Networks. I can explain their services (BPO, digital marketing, recruitment), staffing models, or how to get in touch. What would you like to know?`;

/* SERVICES */
if(t.includes("services"))
return `IAT Networks provides BPO and customer support, digital marketing, and recruitment solutions, along with workforce services — described on their site as comprehensive BPO, IT, and workforce solutions for businesses globally.

Source: iatnetworks.com.`;

/* INTERNSHIP */
if(t.includes("internship"))
return `🎓 Internship available in Web Dev, Marketing, Support.`;

/* CONTACT */
if(t.includes("contact"))
return `From their website:

• Email (resumes / HR): hr@iatnetworks.com

• Phone: +91 73588 34638

You can also use their Contact page on iatnetworks.com.`;

/* LOCATION */
if(t.includes("location"))
return `They market themselves as a consulting and services company based in Vellore, Tamil Nadu, serving clients across industries.

Use their Contact page for the exact address or appointment details.`;

/* BPO */
if(t.includes("bpo"))
return `IAT Networks provides BPO and customer support, digital marketing, and recruitment solutions, along with workforce services — described on their site as comprehensive BPO, IT, and workforce solutions for businesses globally.

Source: iatnetworks.com.`;

/* DIGITAL */
if(t.includes("digital marketing"))
return `Their digital marketing offering is positioned as end-to-end: brand growth online using creativity, analytics, and current tools.

For specifics and engagement, it’s best to contact them directly.`;

/* RECRUITMENT */
if(t.includes("recruitment"))
return `I’m a simple demo bot with answers based on public content from iatnetworks.com.

Try asking about services, recruitment, RPO, permanent staffing, location (Vellore), or contact (hr@iatnetworks.com / +91 73588 34638).

For anything specific, their team can help directly.`;

/* STAFFING */
if(t.includes("permanent staffing"))
return `Permanent staffing means hiring candidates for full-time, long-term positions as direct employees of the client company.`;

/* DEFAULT */
return `Hello! I can help with services, internship, contact or location.`;

}

/* SEND */
function sendMessage(){

let input=document.getElementById("userInput");

let text=input.value;

if(text.trim()==="") return;

let chat=document.getElementById("chatArea");

/* USER */
chat.innerHTML+=`
<div class="message user">${text}</div>
`;

/* TYPING */
chat.innerHTML+=`
<div class="message bot" id="typing">⌛ Typing...</div>
`;

chat.scrollTop=chat.scrollHeight;

setTimeout(()=>{

document.getElementById("typing").remove();

let reply=getReply(text);

/* BOT */
chat.innerHTML+=`
<div class="message bot">${reply}</div>
`;

speak(reply);

chat.scrollTop=chat.scrollHeight;

},600);

input.value="";

}

/* ENTER */
document.getElementById("userInput")
.addEventListener("keypress",(e)=>{

if(e.key==="Enter"){
sendMessage();
}

});

</script>

</body>
</html>
